---
services:
  app:
    build:
      context: ../..
      dockerfile: Containerfile
    # image: ethanashley-net-website-main-go:prod
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - APP_ENV=prod
    # Distroless runs as 65532:65532 (nonroot)
    user: "65532:65532"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/app/server", "--version"]  # ENTRYPOINT exits on unknown flag, but exec exists
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Healthcheck above is best-effort because distroless has no curl/wget;
    # k8s manifests use an HTTP probe instead.
    expose:
      - "8080"

  nginx:
    image: docker.io/library/nginx:stable-alpine # Switch to dhi.io/nginx eventually
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro,Z
      - ../nginx/keys:/etc/nginx/keys:ro,Z
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    read_only: false
    healthcheck:
      # test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/healthz"]
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    expose:
      - "80"
      - "443"
  cloudflared:
    container_name: website-cloudflared
    image: docker.io/cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TOKEN}
    volumes:
      - volumes:
      - ./cloudflared.yaml:/etc/cloudflared:ro
