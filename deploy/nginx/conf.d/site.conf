# https://nginx.org/en/docs/
# https://configurator.tlsref.org/

# Hide nginx version
server_tokens off;

# Block bad bots only from public IPs
map "$is_private:$bad_bot" $block_request {
    "0:1"   1;  # Public IP, Bad Bot, Block
    "1:1"   0;  # Private IP, Bad Bot, Allow
    default 0;  # Allow
}


# Rate-limit zones
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=glob_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=health_limit:5m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=health_limit:5m rate=4r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# gzip
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/rss+xml
    application/wasm
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

# Brotli (not standard)
# brotli on;
# brotli_comp_level 5;
# brotli_types application/javascript application/json application/wasm image/svg+xml text/css text/plain text/xml application/atom+xml application/xml;


# Upstream
upstream app_backend {
    server app:8080;
    keepalive 32;
}

# Dummy Server https://calvin.my/posts/adding-a-catch-all-black-hole-blocks-in-nginx
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    # listen 443 quic reuseport default_server;  # Apprently nginx doesnt like this
    # listen [::]:443 quic reuseport default_server;
    http2 on;
    server_name _;
    ssl_certificate     /etc/nginx/keys/dummy.crt;
    ssl_certificate_key /etc/nginx/keys/dummy.key;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.ethanashley.net ethanashley.net nginx localhost 127.0.0.1;
    # Health endpoints (private only)
    location = /healthz {
        access_log off;
        limit_req zone=health_limit;
        if ($is_private = 0) { return 403; }
        proxy_pass http://app_backend;
    }
    location = /readyz {
        access_log off;
        limit_req zone=health_limit;
        if ($is_private = 0) { return 403; }
        proxy_pass http://app_backend;
    }
    location / {
        return 308 https://$host$request_uri;
    }
}

# Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport bind;
    listen [::]:443 quic reuseport bind;
    server_name www.ethanashley.net ethanashley.net nginx localhost 127.0.0.1;
    ssl_certificate     /etc/nginx/keys/www.ethanashley.net.crt;
    ssl_certificate_key /etc/nginx/keys/www.ethanashley.net.key;

    # OCSP stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /path/to/root_CA_cert_plus_intermediates;
    # resolver 127.0.0.1;

    http2 on;
    http3 on;
    ssl_early_data on;
    quic_retry on;
    quic_gso on;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    # ssl_prefer_server_ciphers off;

    # Blackhole suspect bots and scanning traffic
    # include /etc/nginx/conf.d/blackhole.include;

    # Hard limits
    client_max_body_size 1m;
    client_body_buffer_size 32k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;
    limit_conn conn_per_ip 50;
    limit_req zone=glob_limit burst=120 nodelay;



    # Security headers (the app sets these too)
    # HSTS  TEST ME
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self' 'wasm-unsafe-eval'; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # robots.txt / sitemap.xml come from the app; rate-limit & cache briefly
    location = /robots.txt { proxy_pass http://app_backend; expires 1h; }
    location = /sitemap.xml { proxy_pass http://app_backend; expires 1h; }
    location = /feed.xml { proxy_pass http://app_backend; expires 5m; add_header Cache-Control "public, max-age=300"; }
    location = /atom.xml { proxy_pass http://app_backend; expires 5m; add_header Cache-Control "public, max-age=300"; }

    # Protected paths: never index or cache
    location ^~ /protected {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "private, no-store" always;
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_common.conf;
    }
    location ^~ /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "private, no-store" always;
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # Static assets: cache aggressively, immutable when hashed names are used
    location /static/ {
        proxy_pass http://app_backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Set the right MIME type for WASM
    location ~* \.wasm$ {
        proxy_pass http://app_backend;
        types { application/wasm wasm; }
        default_type application/wasm;
        expires 30d;
    }

    # Health endpoints (private only)
    location = /healthz {
        access_log off;
        limit_req zone=health_limit;
        if ($is_private = 0) { return 403; }
        proxy_pass http://app_backend;
    }
    location = /readyz {
        access_log off;
        limit_req zone=health_limit;
        if ($is_private = 0) { return 403; }
        proxy_pass http://app_backend;
    }

    # Default app traffic
    location / {
        proxy_pass http://app_backend;
        include /etc/nginx/conf.d/proxy_common.conf;
    }
}
