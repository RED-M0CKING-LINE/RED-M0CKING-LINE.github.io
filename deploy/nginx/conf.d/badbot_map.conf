# Maybe one day ill go nuclear
# https://github.com/mitchellkrogza/nginx-ultimate-bad-bot-blocker/blob/master/_generator_lists/bad-user-agents.list
map $http_user_agent $bad_bot {
    default 0;
    ""      1;  # Block empty user agents
    # P1: Active Security Scanners & Exploit Tools
    "~*(Acunetix|Nikto|Nmap|Sqlmap|Nuclei|Masscan|WPScan|Nessus|OpenVAS|Havij)" 1;
    "~*(Jbrofuzz|Fimap|Libwhisker|Whatweb|Shodan|zgrab|ZmEu|muhstik-scan|scan\.lol)" 1;
    "~*(Dirbuster|Gobuster|Feroxbuster|l9scan|leakix|Jorgee|w3af)" 1;
    # P2: AI Scrapers, Mass Collectors & Generic HTTP Libraries
    "~*(Bytespider|GPTBot|ClaudeBot|CCBot|ChatGPT-User|anthropic-ai|cohere-ai|FacebookBot|meta-externalagent|ImagesiftBot)" 1;
    "~*(Scrapy|Heritrix|Nutch|Typhoeus|PyCurl|python-requests|Go-http-client)" 1;
    "~*(Java|curl|libwww-perl|lwp-request|lwp-trivial)" 1;
    # P3: SEO Crawlers & Link Analysis Bots
    "~*(AhrefsBot|SemrushBot|MJ12bot|DotBot|BLEXBot|Rogerbot|Majestic12|MegaIndex\.ru|Petalbot|SEOprofiler)" 1;
    "~*(SEOkicks|SEOlyticsCrawler|Screaming|serpstatbot|dataforseobot|seoscanners|RankActive|Seomoz|spyfu|SistrixBot)" 1;
    # P4: Web Copiers, Offline Browsers & Download Tools
    "~*(HTTrack|WebCopier|WebZIP|WebSucker|WebReaper|WebStripper|WebWhacker|SiteSucker)" 1;
    "~*(TeleportPro|GetRight|LeechFTP|LeechGet|FlashGet|NetAnts|Mass Downloader)" 1;
    "~*(Offline Explorer|Teleport|LWP::Simple|Grabber|GrabNet|BlackWidow)" 1;
    # P5: Email Harvesters, Aggressive Scrapers & Misc Bad Bots
    "~*(EmailSiphon|EMail Wolf|autoemailspider|BackDoorBot|Alexibot|Mister PiX)" 1;
    "~*(Sucuri|Virusdie|T0PHackTeam|Toata|MauiBot)" 1;
}