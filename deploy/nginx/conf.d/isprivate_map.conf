# set_real_ip_from 10.0.0.0/8;
# set_real_ip_from 192.168.0.0/16;
# real_ip_header X-Forwarded-For;

set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
set_real_ip_from 169.254.0.0/16;
set_real_ip_from fe80::/10;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from fc00::/7;
set_real_ip_from 100.64.0.0/10;

real_ip_header CF-Connecting-IP;

geo $is_private {
    default         0;

    # Localhost
    127.0.0.1       1;
    ::1             1;

    # Link-local
    169.254.0.0/16  1;
    fe80::/10       1;

    # Private ranges
    10.0.0.0/8      1;
    172.16.0.0/12   1;
    192.168.0.0/16  1;
    fc00::/7        1;

    # Exotic, can be internal but not intended to be
    100.64.0.0/10   1; # CG-NAT
    240.0.0.0/4     1; # Class E
    192.0.2.0/24    1; # Documentation TEST-NET 1
    198.51.100.0/24 1; # Documentation TEST-NET 2
    203.0.113.0/24  1; # Documentation TEST-NET 3
    64:ff9b:1::/48  1; # Local-use address translation
    2001:db8::/32   1; # Documentation
    3fff::/20       1; # More Documetation
}

