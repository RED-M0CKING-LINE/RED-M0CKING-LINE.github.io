# kubectl apply -f deployment.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: ea-web
---
apiVersion: v1
kind: Secret
metadata:
  name: ea-web-secrets
  namespace: ea-web
type: Opaque
stringData:
  COOKIE_SECRET: ""
  OIDC_CLIENT_SECRET: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ea-web-config
  namespace: ea-web
data:
  APP_ENV: "prod"
  ADDR: ":8080"
  SITE_NAME: "EA"
  BASE_URL: "https://ethanashley.net"
  OIDC_ISSUER: ""
  OIDC_CLIENT_ID: ""
  OIDC_REDIRECT_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ea-web-app
  namespace: ea-web
  labels: { app: ea-web-app }
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: ea-web-app }
  template:
    metadata:
      labels: { app: ea-web-app }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/SOMETHING/ETHANASHLEY-NET_WEBSITE-MAIN-GO:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: ea-web-config }
            - secretRef:    { name: ea-web-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: ea-web-app }
---
apiVersion: v1
kind: Service
metadata:
  name: ea-web-app
  namespace: ea-web
spec:
  selector: { app: ea-web-app }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ea-web-app
  namespace: ea-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ea-web-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ea-web-app
  namespace: ea-web
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: ea-web-app }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ea-web-app
  namespace: ea-web
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  ingressClassName: nginx
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ea-web-app
                port: { name: http }
