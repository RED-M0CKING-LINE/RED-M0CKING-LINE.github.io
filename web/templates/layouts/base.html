{{define "base.html"}}<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{block "title" .}}{{.SiteName}}{{end}}</title>
  <meta name="description" content="{{block "description" .}}{{end}}" />
  <link rel="icon" type="image/png" href="/static/img/favicon.png" />
  <link rel="alternate" type="application/atom+xml" title="{{.SiteName}} feed" href="{{.BaseURL}}/feed.xml" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {{block "head" .}}{{end}}
  <script src="/static/js/theme.js"></script>
</head>
<body>
  {{template "header.html" .}}
  <main id="content" class="container">
    {{block "content" .}}{{end}}
  </main>
  {{template "footer.html" .}}
  <script src="/static/js/app.js" defer></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
